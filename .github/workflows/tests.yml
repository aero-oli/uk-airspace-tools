name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  unit-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lint tooling
        run: python -m pip install ruff

      - name: Run lint checks
        run: ruff check .

      - name: Build plugin zip
        shell: pwsh
        run: ./scripts/build-plugin-zip.ps1

      - name: Run unit tests
        run: python -m unittest discover uk_airspace_tools/tests

      - name: Compile package
        run: python -m compileall -q uk_airspace_tools
